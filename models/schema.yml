models:
  - name: dim_listings_clean
    description: Cleaned dimension table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          
    columns:
     - name: listing_id
       description: Primiary key for each listing.
       data_tests:
         - unique
         - not_null

     - name: host_id
       description: Foreign key to the dim_hosts_clean table.
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_clean')
               field: host_id

     - name: room_type
       description: The type of room being offered.
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']

     - name: minimum_nights
       description: '{{ doc("dim_listings_clean__minimum_nights") }}'
       data_tests:
          - positive_values

  - name: dim_hosts_clean
    config:
      contract:
        enforced: true
    columns:  
    - name: host_id
      data_type: integer
    - name: host_name
      data_type: string
    - name: host_since
      data_type: date
    - name: host_location
      data_type: string
    - name: host_response_time
      data_type: string
    - name: host_response_rate
